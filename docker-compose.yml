services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
      - db:/app/prisma
    environment:
      DATABASE_URL: "file:/app/prisma/prod.db"
      AUTH_SECRET: "local-dev-secret-change-in-production"
      AUTH_URL: "http://localhost:3000"
      PLATFORM_ADMIN_EMAIL: "admin@momentcap.app"
      PLATFORM_ADMIN_PASSWORD: "changeme"

volumes:
  uploads:
  db:
